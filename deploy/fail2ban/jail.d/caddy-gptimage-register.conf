# fail2ban jail: ban IPs flooding GPTImage's dynamic client registration.
#
# Additive and self-contained — a SEPARATE jail from caddy-gptimage-401, on
# the same Caddy log. Does not touch the 401 jail, the sshd jail, or any other
# service on the host. Legitimate onboarding registers once; a repeated 4xx
# stream on /oauth/register is abuse, so this is tighter than the login jail.
#
# Install to /etc/fail2ban/jail.d/caddy-gptimage-register.conf, then reload.
# Unban:  fail2ban-client set caddy-gptimage-register unbanip <ip>
[caddy-gptimage-register]
enabled  = true
port     = http,https
filter   = caddy-gptimage-register
logpath  = /var/log/caddy/gptimage.log
maxretry = 6
findtime = 120
bantime  = 3600
