# fail2ban jail: ban IPs that rack up 401s against the GPTImage endpoint.
# Install to /etc/fail2ban/jail.d/caddy-gptimage.conf, then reload fail2ban.
#
# maxretry accounts for legitimate 401s in the OAuth era: every connector
# handshake opens with one 401 challenge on /mcp (that's how RFC 9728
# discovery starts), and an expired access token earns another before the
# refresh. 8-in-120s still catches password guessing on /oauth/authorize
# (which 401s on bad credentials by design) without banning claude.ai/ChatGPT
# egress IPs mid-setup. Server-side rule that keeps this sane: token-endpoint
# grant failures (invalid_grant) are 400, NEVER 401.
#
# Unban:  fail2ban-client set caddy-gptimage-401 unbanip <ip>
[caddy-gptimage-401]
enabled  = true
port     = http,https
filter   = caddy-gptimage-401
logpath  = /var/log/caddy/gptimage.log
maxretry = 8
findtime = 120
bantime  = 3600
