# fail2ban filter: repeated 4xx on GPTImage's /oauth/register.
#
# Dynamic client registration is unauthenticated and never returns 401, so the
# 401 jail (caddy-gptimage-401) can't see a registration flood. This filter
# matches ANY 4xx on the /oauth/register path in Caddy's JSON access log, keyed
# on the real TCP peer (remote_ip) — not the spoofable X-Forwarded-For.
#
# Install to /etc/fail2ban/filter.d/caddy-gptimage-register.conf.

[Definition]
failregex = ^.*"remote_ip":"<HOST>".*"uri":"/oauth/register[^"]*".*"status":4\d\d.*$
ignoreregex =
